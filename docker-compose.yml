services:
  harvester:
    build: .
    container_name: hpi-harvester
    restart: unless-stopped
    environment:
      # Container timezone affects cron evaluation and log timestamps.
      # Override via .env or shell to match your config's `timezone:` field.
      - TZ=${TZ:-Europe/Madrid}
      # Optional: only used by exporters that read the API key from env
      # (see examples/harvester.yaml — the env-based variant is commented
      # out by default).
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      # Optional: ps-timetracker cookie for the env-based variant of the
      # ps_timetracker exporter. Leave empty if you use the file-based variant
      # (/secrets/ps_timetracker.cookie).
      - PS_TIMETRACKER_COOKIE=${PS_TIMETRACKER_COOKIE:-}
    volumes:
      - ./config:/config:ro
      - ./secrets:/secrets:ro
      # Writable per-exporter state (OAuth refresh tokens, cursors, ...).
      # Kept separate from :ro /secrets so tools like traktexport can
      # rewrite their creds on token refresh.
      - ./state:/state
      - ${HPI_DATA_DIR:-./data}:/data
